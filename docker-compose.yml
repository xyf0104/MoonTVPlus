# 无风影视 Docker Compose 配置
# 使用 GitHub Container Registry 预构建镜像，无需在服务器上编译
# 使用方式: docker compose up -d
services:
  wufeng-tv:
    image: ghcr.io/xyf0104/moontvplus:latest
    container_name: wufeng-tv
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # 站点配置
      - NEXT_PUBLIC_SITE_NAME=无风影视
      # 存储类型：使用 kvrocks 实现持久化
      - NEXT_PUBLIC_STORAGE_TYPE=kvrocks
      # Kvrocks 连接配置
      - KVROCKS_URL=redis://wufeng-kvrocks:6666
      # 管理员账号（请修改为你自己的）
      - USERNAME=admin
      - PASSWORD=admin123
    networks:
      - wufeng-net
    depends_on:
      - wufeng-kvrocks

  # Kvrocks - Redis 兼容的持久化键值存储
  # NOTE: 相比 Redis，Kvrocks 基于 RocksDB，磁盘友好，适合云服务器部署
  wufeng-kvrocks:
    image: apache/kvrocks:latest
    container_name: wufeng-kvrocks
    restart: unless-stopped
    volumes:
      # 持久化 Kvrocks 数据
      - kvrocks-data:/var/lib/kvrocks
    networks:
      - wufeng-net

networks:
  wufeng-net:
    driver: bridge

volumes:
  kvrocks-data:
    driver: local
